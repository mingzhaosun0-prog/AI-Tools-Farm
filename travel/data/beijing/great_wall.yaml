# Comprehensive visiting guidance
visiting_guidance:
  getting_there:
    options:
      - method: "Private car/taxi"
        details: "Most flexible but expensive (¥500-800 round trip). Negotiate price before departure."
      - method: "Tour bus"
        details: "Many hotels and tour operators offer day trips (¥200-400 including transport and basic lunch)."
      - method: "Public bus"
        details: "Bus 877 from Deshengmen to Badaling (¥12, 1.5 hours). Buses to Mutianyu from Dongzhimen (Holiday only)."
      - method: "High-speed train + shuttle"
        details: "Beijing North to Badaling Great Wall station (¥20-30, 30 minutes). Then free shuttle bus."
  
  what_to_bring:
    - "Comfortable hiking shoes (non-slip soles)"
    - "Water (at least 1-2 liters per person)"
    - "Snacks and energy bars (overpriced on the wall)"
    - "Sun protection (hat, sunscreen, sunglasses)"
    - "Light rain jacket (weather changes quickly)"
    - "Power bank for phone/camera"
    - "Cash (some sections have limited card payment)"
    - "Passport (required for ticket purchase)"
  
  tips:
    - "Arrive early (before 8:00 AM) to avoid crowds and heat"
    - "Start with the most popular section (Badaling or Mutianyu) if it's your first time"
    - "Spend at least 3-4 hours to fully experience a section"
    - "Take the cable car up and hike down for a balanced experience"
    - "Visit on weekdays if possible (Tuesday-Thursday are best)"
    - "Check weather forecast – fog or rain can ruin views"
    - "Bring binoculars for better watchtower views"
    - "Don't take stones or bricks as souvenirs (protected heritage)"
    - "Download offline maps and translator apps (signal may be weak)"
  
  what_to_avoid:
    - "Peak holiday periods (Labor Day, National Day, New Year)"
    - "Scorching summer afternoons (11 AM – 3 PM)"
    - "Unauthorized guides at the entrance (use official ones)"
    - "Souvenir shops on the wall (overpriced and low quality)"
    - "Climbing on unrestored sections without a guide"
  
  nearby_attractions:
    - name: "Ming Tombs (Shisanling)"
      distance: "20 km from Badaling"
      description: "Burial site of 13 Ming Dynasty emperors"
    - name: "Gubei Water Town"
      distance: "Adjacent to Simatai"
      description: "Recreated ancient water town with hot springs"
    - name: "Juyongguan Pass"
      distance: "18 km from Badaling"
      description: "Historic mountain pass with impressive gate tower"
    - name: "Beijing Botanical Garden"
      distance: "50 km from Mutianyu"
      description: "Beautiful gardens and temple complex"
  
  estimated_time_needed: "Full day (8-10 hours including travel from Beijing)"
  
  average_cost_per_person: |
    - Budget: ¥150-250 (bus + entrance + snacks)
    - Mid-range: ¥300-500 (tour bus + entrance + cable car + lunch)
    - Luxury: ¥800-1500 (private car + VIP tour + full meals)

tips: |
  - **Choose the right section** based on your fitness and crowd preference
  - **Wear layers** – mornings can be cold even in summer
  - **Hydrate frequently** – there's little shade on the wall
  - **Take breaks** at watchtowers (they offer shade and breeze)
  - **Use official ticket windows** – avoid scalpers
  - **Learn a few Chinese phrases** for emergencies and bargaining
  - **Emergency number**: 110 (police), 120 (ambulance)

