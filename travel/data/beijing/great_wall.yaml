name: "The Great Wall of China"
subtitle: "The world's longest defensive structure and a timeless wonder"
description: |
  The Great Wall of China is a series of fortifications made of stone, brick, tamped earth, wood, and other materials. It was built along the historical northern borders of China to protect against invasions and raids. The most famous and best-preserved sections near Beijing are Badaling, Mutianyu, Jinshanling, and Simatai.

  Stretching over 21,000 kilometers, it's one of the most impressive architectural feats in human history, visible even from space (under ideal conditions).
history: |
  Construction of the Great Wall began as early as the 7th century BC, with separate states building their own walls for defense. The first Emperor of Qin, Qin Shi Huang (259–210 BC), connected and expanded these walls to form a unified system.

  The most famous sections were built during the Ming Dynasty (1368–1644), using bricks and stone instead of rammed earth. The Ming Wall stretches approximately 8,850 km from Shanhaiguan on the east coast to Jiayuguan in the Gobi Desert.

  After the Ming Dynasty, the Great Wall lost its strategic importance. Today, it's a UNESCO World Heritage Site (since 1987) and one of the New Seven Wonders of the World.
opening_hours: |
  - **Badaling**: 06:30 – 19:00 (April–October), 07:00 – 18:00 (November–March)
  - **Mutianyu**: 08:00 – 18:00 (April–October), 08:00 – 17:00 (November–March)
  - **Jinshanling**: 06:00 – 18:30 (peak), 06:30 – 17:00 (off-peak)
ticket_price: |
  - **Badaling**: ¥40 (peak), ¥35 (off-peak) + cable car ¥140 round trip
  - **Mutianyu**: ¥45 (peak), ¥40 (off-peak) + cable car or toboggan ¥120
  - **Jinshanling**: ¥65 (peak), ¥55 (off-peak)
  - **Simatai**: ¥40 (day), ¥160 (night tour)
best_time: |
  - **April to June**: Spring flowers, comfortable temperatures (15-25°C)
  - **September to October**: Autumn foliage, clear skies, golden light
  - **Avoid**: National Holiday week (Oct 1-7) – extreme crowds
  - **Avoid**: July-August – heat, humidity, and frequent rain
