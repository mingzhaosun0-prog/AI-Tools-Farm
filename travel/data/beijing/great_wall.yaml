location: "Various sections north of Beijing (60-120 km from city center)"
activities: |
  - Hiking and trekking (varying difficulty)
  - Photography (sunrise/sunset spots)
  - Cable car or chairlift rides
  - Toboggan ride down at Mutianyu
  - Night tours at Simatai
  - Historical exploration of watchtowers and battlements

