name: "National Museum of China"
subtitle: "Walk Through 5,000 Years of Chinese Civilisation"
description: |
  The National Museum of China (NMC) is one of the world's largest museums, located on the eastern side of Tiananmen Square. Spanning 192,000 square metres, it showcases over 1.4 million artefacts covering China's illustrious history from the Yuanmou Man (1.7 million years ago) to the modern era.

  The museum's permanent exhibition "The Road to Rejuvenation" chronicles China's modern period from 1840 onwards, while "Ancient China" traces the glory of early civilisations through exquisite bronzes, jade, pottery, calligraphy, and imperial treasures.

  Highlights include the Simuwu Ding (the world's largest ancient bronze vessel, weighing 832 kg), the exquisite jade burial suits of the Han Dynasty, and the breathtaking Tang Dynasty gold and silverware.
history: |
  The museum was established in 2003 through the merger of two separate institutions: the Museum of Chinese Revolution (founded 1950) and the National Museum of Chinese History (founded 1959). 

  The building itself was one of the "Ten Great Buildings" constructed for the 10th anniversary of the People's Republic in 1959. It underwent a major four-year renovation from 2007-2011 that tripled its exhibition space and modernised facilities.

  Today, with over 7 million annual visitors, it ranks among the most-visited museums in the world and continues to serve as China's premier national museum.
opening_hours: "09:00 – 17:00 (last entry 16:00). Closed Mondays (except public holidays)."
ticket_price: "Free (passport required — book online in advance). Special exhibitions: ¥20-50 extra."
best_time: "Weekday mornings (fewer school groups). Avoid Mondays (closed) and Chinese holidays."
tips:
  - "BOOK ONLINE in advance — free tickets run out quickly, especially weekends."
  - "Bring your passport — required for entry even with online booking."
  - "Allow at least 3-4 hours — the museum is enormous."
  - "Start with 'Ancient China' on the ground floor (the best collection)."
  - "Audio guide recommended (¥40, available in 10+ languages)."
  - "No large bags or selfie sticks allowed inside."
  - "Photography allowed (no flash, no tripod)."
  - "Combine with Tiananmen Square and Forbidden City in one day."
