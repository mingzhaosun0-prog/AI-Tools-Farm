    pros: "World-class collection, clear chronological flow"
    cons: "Can be crowded, requires 2+ hours to do justice"
  
  Road to Rejuvenation:
    difficulty: "Easy"
    crowd_level: "Moderate"
    recommended_for: "Modern history enthusiasts"
    description: "Chronicles China's journey from the Opium Wars (1840) through the founding of the PRC to modern day. Features revolutionary artefacts and multimedia displays."
    pros: "Fascinating modern history with excellent curation"
    cons: "Some exhibits focused on political messaging"
  
  Special Exhibitions:
    difficulty: "Easy"
    crowd_level: "Variable"
    recommended_for: "Return visitors, art lovers"
    description: "Rotating exhibitions featuring international collaborations, contemporary art, and deep dives into specific historical periods or artistic traditions."
    pros: "Unique and ever-changing content"
    cons: "Extra fee (¥20-50), limited viewing time"

