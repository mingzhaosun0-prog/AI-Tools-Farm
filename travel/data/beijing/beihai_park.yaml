# ── Difficulty & Accessibility ──
difficulty_accessibility:
  physical_difficulty: "Easy to Moderate — flat lakeside paths but some stairs for the pagoda"
  walking_distance: "3-5 km to explore the full park"
  wheelchair_accessible: "Partially — main lakeside paths are flat and paved. Qionghua Island has stairs."
  best_for_elderly: "Yes — stick to the flat lakeside paths, enjoy the gardens from ground level"
