# ── Crowd Patterns ──
crowd_patterns:
  peak_hours: "10:00 AM - 4:00 PM. Weekends busier than weekdays."
  best_time_to_visit: "07:00-09:00 (morning calm, local activities) or 16:00-18:00 (golden hour light)"
  seasonal_tips: "Spring (Mar-May): Cherry blossoms and flowers. Summer: Boating season, but hot. Autumn: Beautiful foliage. Winter: Frozen lake activities, fewer crowds."
  holiday_info: "Busy on weekends and holidays, especially during spring blossom season"

# ── Sections ──
sections:
  Qionghua Island & White Pagoda:
    difficulty: "Moderate (stairs to top)"
    crowd_level: "Very crowded"
    recommended_for: "All visitors, photographers"
    description: "The centrepiece of the park — an island connected by a beautiful arched bridge. Atop it sits the iconic White Pagoda, a Tibetan-style stupa offering panoramic views."
    pros: "Iconic views, beautiful architecture, best photo spot"
    cons: "Crowded, stairs required for pagoda access"
  
  Round City:
    difficulty: "Easy"
    crowd_level: "Moderate"
    recommended_for: "History enthusiasts, art lovers"
    description: "A circular walled complex at the park's southern entrance, housing the Jade Buddha and a famous large jade bowl from the Yuan Dynasty."
    pros: "Rare historical artefacts, quiet and contemplative"
    cons: "Less visually dramatic than the pagoda"
  
  East Bank Gardens:
    difficulty: "Easy"
    crowd_level: "Quiet"
    recommended_for: "Walkers, those seeking peace"
    description: "A series of smaller garden areas along the eastern shore, featuring pavilions, rockeries, and the famous Nine-Dragon Screen."
    pros: "Peaceful, fewer tourists, the Nine-Dragon Screen is a must-see"
    cons: "Fewer amenities, can feel repetitive"

# ── Practical Info ──
