name: "Beijing Hutongs & Siheyuan"
subtitle: "Explore the Historic Alleyways of Old Beijing"
description: |
  Hutongs are narrow alleys formed by lines of traditional courtyard residences (siheyuan) that date back centuries. These winding lanes are the arteries of old Beijing, preserving the city's traditional urban fabric and community life. 

  The most famous hutongs cluster around the areas north of the Forbidden City (Nanluoguxiang, Shichahai, Yandai Xiejie) and offer a glimpse into authentic local culture with their courtyard homes, street food stalls, artisan shops, and hidden temples.

  Exploring the hutongs by rickshaw, bicycle, or on foot is one of the most rewarding experiences in Beijing, revealing a side of the city far removed from its modern skyscrapers.
history: |
  The word "hutong" originated from the Mongolian word "hudug" meaning "water well" — a reference to the wells around which the first neighbourhoods formed. The hutongs date back to the Yuan Dynasty (1271–1368).

  During the Ming and Qing dynasties, Beijing expanded dramatically, and the orderly grid of hutongs became the standard residential layout. At their peak, there were over 6,000 hutongs in Beijing.

  In recent decades, rapid urbanisation has seen many hutongs demolished for modern developments. Today, approximately 1,000 hutongs remain, and the government has designated several areas as protected cultural zones.
opening_hours: "Public lanes: 24 hours. Shops/cafés in tourist hutongs: ~10:00–22:00"
ticket_price: "Free to explore. Some siheyuan as museums charge ¥10-30 entry. Rickshaw tour: ¥150-300 per hour."
best_time: "Late afternoon (warm golden light, lively atmosphere). Avoid midday heat in summer."
tips:
  - "Rent a bike or take a rickshaw tour for the best experience."
  - "Visit Nanluoguxiang for trendy shops and cafés."
  - "Shichahai / Houhai area is beautiful at night with lakeside bars."
  - "Yandai Xiejie (Tobacco Pipe Lane) is great for souvenirs and snacks."
  - "Enter a siheyuan courtyard if the door is open (respect privacy)."
  - "Visit early morning (7-9am) to see local life — elderly playing chess, cooking, exercising."
