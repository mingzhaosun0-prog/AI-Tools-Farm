# ── Crowd Patterns ──
crowd_patterns:
  peak_hours: "11:00 AM - 5:00 PM (tourist hub Nanluoguxiang), 7:00 PM - midnight (Houhai bars)"
  best_time_to_visit: "Early morning (7-9am) for authentic local life, or late afternoon (4-6pm) for golden light"
  seasonal_tips: "Spring and autumn are ideal. Summer evenings are lively. Winter has fewer tourists but outdoor time is limited."
  holiday_info: "Nanluoguxiang gets extremely crowded on weekends and holidays"

# ── Sections ──
sections:
  Nanluoguxiang:
    difficulty: "Easy"
    crowd_level: "Very crowded (peak hours, weekends)"
    recommended_for: "Shoppers, foodies, young travellers"
    travel_time_from_beijing: "15 min metro from city centre"
    description: "An 800-metre long hutong lined with boutique stores, cafés, street food and souvenir shops. Very touristy but still worth visiting for the energy and variety."
    pros: "Lively atmosphere, great food, easy access"
    cons: "Very crowded, commercialised, not 'authentic' old Beijing"
  
  Shichahai & Houhai:
    difficulty: "Easy"
    crowd_level: "Moderate (day), Very crowded (evening)"
    recommended_for: "Bar-goers, couples, photographers"
    travel_time_from_beijing: "20 min metro from city centre"
    description: "A scenic area around three interconnected lakes, surrounded by hutongs, historic mansions, and nightlife. Popular for lakeside walks, boat rides, and evening bar-hopping."
    pros: "Beautiful lake views, vibrant nightlife, photo-worthy scenes"
    cons: "Crowded at night, tourist prices at bars"
  
  Yandai Xiejie:
    difficulty: "Easy"
    crowd_level: "Moderately crowded"
    recommended_for: "Souvenir hunters, snack lovers"
    travel_time_from_beijing: "15 min metro from city centre (via Nanluoguxiang)"
    description: "A narrow sloping lane known for its speciality shops and traditional snacks. Great for picking up unique gifts and tasting Beijing street food."
    pros: "Unique shops, tasty snacks, less crowded than Nanluoguxiang"
    cons: "Short lane (can be overcrowded on weekends)"

# ── Practical Info ──
practical_info:
  chinese_name: "胡同"
  pinyin: "Hútòng"
  chinese_address: "北京市东城区南锣鼓巷"
  directions_by_metro: "Nanluoguxiang: Line 6 or Line 8 (Nanluoguxiang station, Exit E). Shichahai: Line 8 (Shichahai station)"
  best_transport: "Metro + walking. Ride-sharing apps (Didi) can drop at hutong entrances but cannot enter narrow lanes."

# ── Difficulty & Accessibility ──
difficulty_accessibility:
  physical_difficulty: "Easy — flat, paved, but many steps and narrow passages"
  walking_distance: "3-6 km depending on how many areas you explore"
  wheelchair_accessible: "Partially — main hutong lanes (Nanluoguxiang) are paved. Side hutongs may have steps and uneven surfaces."
  accessibility_features:
    - "Main tourist hutongs (Nanluoguxiang) are paved and wheelchair-friendly"
    - "Houhai lakeside walkway is flat and accessible"
    - "Rickshaw tours can accommodate limited mobility"
  best_for_elderly: "Stick to main lanes and lakeside paths. Avoid narrow side hutongs with steps."
