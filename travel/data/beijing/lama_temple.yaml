name: "Lama Temple (Yonghe Temple)"
subtitle: "The Most Renowned Tibetan Buddhist Monastery Outside Tibet"
description: |
  The Lama Temple, officially known as Yonghe Temple (雍和宫), is one of the largest and most important Tibetan Buddhist monasteries in the world. Built in 1694 as the residence for a Ming Dynasty eunuch, it was later converted into a lamasery in 1744.

  The temple features five grand halls decorated with intricate murals, rotating sutra cabinets, and stunning bronze statues. The highlight is the 26-metre-tall statue of the Maitreya Buddha (Future Buddha), carved from a single sandalwood log — a Guinness World Record holder.

  Despite being a functioning monastery, the temple is open to the public and attracts millions of visitors annually who come to admire its architecture, burn incense for blessings, and soak in the serene spiritual atmosphere.
history: |
  The temple's history began in 1694 when it was built as a palace for the eldest son of Qing Emperor Kangxi. In 1722, it was converted into a residence for his son, who would become Emperor Qianlong, one of China's greatest rulers.

  In 1744, Emperor Qianlong ordered the conversion of the palace into a Tibetan Buddhist monastery for lamas from Mongolia and Tibet — a strategic decision that strengthened ties between the Qing court and the Tibetan Buddhist world.

  The temple has survived multiple fires, the Cultural Revolution (where it was protected by Premier Zhou Enlai's intervention), and continues today as a living monastery where monks still study, pray, and perform ceremonies.
opening_hours: "09:00 – 16:30 (April–October), 09:00 – 16:00 (November–March)"
ticket_price: "¥25 (includes free sticks of incense)"
best_time: "Weekday mornings (weekends are extremely crowded). Best months: April-June and September-October."
tips:
  - "Free incense is provided — use it at the main halls."
  - "Dress modestly (shoulders and knees covered)."
  - "Turn the prayer wheels clockwise."
  - "Write your wishes on tags near the main hall."
  - "Combine with Confucious Temple (next door, ¥30)."
  - "Visit early to avoid tour bus crowds."
