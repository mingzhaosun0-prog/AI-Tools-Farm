# ── Crowd Patterns ──
crowd_patterns:
  peak_hours: "10:00 AM - 2:00 PM especially on weekends and Buddhist holy days"
  best_time_to_visit: "09:00 AM opening time for a serene experience"
  seasonal_tips: "Chinese New Year period: very crowded but special ceremonies. Summer: more tourists."
  holiday_info: "Extremely crowded during Chinese New Year, Buddhist festivals (especially the 1st and 15th of lunar month)"

# ── Sections ──
sections:
  Yonghe Gate:
    difficulty: "Easy"
    crowd_level: "Moderate"
    recommended_for: "Arrival, orientation, entrance photos"
    description: "The entrance gate featuring the Hall of Heavenly Kings with a statue of Maitreya Buddha flanked by Four Heavenly Kings."
  
  Hall of Harmony:
    difficulty: "Easy"
    crowd_level: "Moderately crowded"
    recommended_for: "Architecture enthusiasts, photographers"
    description: "The main prayer hall with ornate ceiling murals, prayer wheels, and three large bronze Buddha statues representing past, present, and future."
  
  Hall of Eternal Protection:
    difficulty: "Easy"
    crowd_level: "Very crowded"
    recommended_for: "Buddhist devotees, wish-makers"
    description: "The most popular hall for prayer and incense offerings. Dedicated to Tsongkhapa, founder of the Gelug school of Tibetan Buddhism."
  
  Pavilion of the Wheel of Law:
    difficulty: "Easy"
    crowd_level: "Moderate"
    recommended_for: "Art lovers, history buffs"
    description: "Houses a large rotating sutra cabinet (scripture library) with 108 volumes of Buddhist texts."
  
  Wanfu Pavilion:
    difficulty: "Easy (stairs inside)"
    crowd_level: "Very crowded"
    recommended_for: "Everyone — the main attraction"
    description: "Three-story pavilion housing the magnificent 26-metre Maitreya Buddha statue carved from a single sandalwood log in 1750."

# ── Practical Info ──
practical_info:
  chinese_name: "雍和宫"
  pinyin: "Yōnghé Gōng"
  chinese_address: "北京市东城区雍和宫大街12号"
  directions_by_metro: "Line 2 or Line 5 (Yonghegong station, Exit C or D)"
  audio_guide: "Available at entrance (¥40, available in English, Chinese, French, Japanese)"
  photography_policy: "Photography allowed in courtyards but NOT inside temple halls (no flash)"

# ── Difficulty & Accessibility ──
difficulty_accessibility:
  physical_difficulty: "Easy — flat courtyards with some steps into halls"
  walking_distance: "1-2 km through the complex"
  wheelchair_accessible: "Partially — main courtyards are accessible; some halls have steps and no ramp"
  best_for_elderly: "Yes — easy walking, benches available in courtyards, mostly flat"

# ── Itinerary Suggestions ──
itineraries:
  quick_1hour:
    duration: "1 hour"
    route: "Main axis: Gate → Hall of Harmony → Wanfu Pavilion (Maitreya Buddha) → exit"
    highlights: "The iconic Buddha statue and main prayer hall"
    best_for: "Limited time, Buddha statue must-see"
  
  standard_2hours:
