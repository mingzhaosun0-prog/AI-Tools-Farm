name: "Summer Palace"
subtitle: "Imperial Garden and Royal Retreat"
subtitle_zh: "皇家园林与避暑胜地"
description: |
  The Summer Palace is a vast ensemble of lakes, gardens, and palaces in Beijing. It was used as a summer retreat by imperial families.
description_zh: |
  颐和园是北京一处由湖泊、园林和宫殿组成的庞大建筑群，曾是皇家的夏日避暑胜地。
history: |
  First built in 1750, largely destroyed in 1860 and restored in 1886. It is a masterpiece of Chinese landscape garden design.
history_zh: |
  颐和园始建于1750年，1860年遭严重破坏，1886年重建。它是中国园林设计艺术的杰作。
opening_hours: "06:30 – 20:00 (peak season), 07:00 – 19:00 (off season)"
ticket_price: "¥30 (entrance), ¥60 (combined ticket including garden and boat)"
best_time: "May–September for boating; autumn for foliage"
tips:
  - "Rent a boat on Kunming Lake."
  - "Walk up Longevity Hill for panoramic views."
  - "Avoid weekends to reduce crowds."
images:
  - url: "https://picsum.photos/seed/summer-palace-1/800/600"
    caption: "Kunming Lake and Longevity Hill"
  - url: "https://picsum.photos/seed/summer-palace-2/800/600"
    caption: "The iconic Marble Boat"
  - url: "https://picsum.photos/seed/summer-palace-3/800/600"
    caption: "The Long Corridor with intricate paintings"
location: "Haidian District, Beijing"
activities: "Boating, walking trails, temple visits"
estimated_time_needed: "3-5 hours"

# ── Crowd Patterns ──
crowd_patterns:
  peak_hours: "10:00 AM - 4:00 PM daily"
  best_time_to_visit: "7:00-9:00 AM (morning light, fewer crowds) or after 5:00 PM"
  seasonal_tips: "May-Jun: Spring flowers. Sep-Oct: Autumn foliage, perfect weather. Jul-Aug: Hot, avoid midday."
  holiday_info: "Avoid weekends and holidays. Weekdays are significantly quieter."
  special_times: "Early morning: local tai chi groups, beautiful light"

# ── Practical Info ──
practical_info:
  chinese_name: "颐和园"
  pinyin: "Yíhéyuán"
  chinese_address: "北京市海淀区新建宫门路19号"
  phone: "+86 10 6288 1144"
  wechat_official: "SummerPalaceBeijing"
  directions_by_metro: "Line 4 (北宫门 North Gate) or Line 15 (Xiyuan)"
  nearby_metro_exit: "North Gate: Exit A (Summer Palace North Gate), South Gate: Bus 330"
  parking_available: true
  parking_cost: "¥10/hour"
  wheelchair_rental: "¥50 deposit at main entrance"

# ── Difficulty & Accessibility ──
difficulty_accessibility:
  physical_difficulty: "Easy to Moderate - mostly flat paved paths with some stairs"
  walking_distance: "3-8 km depending on route (can be shortened)"
  wheelchair_accessible: "Mostly yes - main pathways are paved and accessible"
  accessibility_features:
    - "Accessible restrooms throughout"
    - "Wheelchair rentals available (¥50)"
    - "Flat pathways along lake"
    - "Some stairs to temples (can be avoided)"
  best_for_elderly: "Yes - comfortable pace, can rest by water, many seating areas"
  boat_tours_accessible: "Yes - boats have gentle boarding"

# ── Itinerary Suggestions ──
itineraries:
  quick_2hours:
    duration: "2 hours"
    route: "North Gate → Marble Boat → Longevity Hill (short climb) → Long Corridor → exit"
    highlights: "Iconic sights, photo ops, good overview"
    best_for: "Limited time, those wanting main attractions"
  
  half_day_3hours:
    duration: "3-4 hours"
    route: "North Gate → Long Corridor → Temple of Lingyin → Marble Boat → Kunming Lake Walk → Hall of Jade Ripples"
    highlights: "Complete tour with gardens, temples, and lake views"
    best_for: "Most visitors, good mix of culture and nature"
    tip: "Include one boat ride for authentic experience (¥50 per person)"
    
  full_day_5hours:
    duration: "5-6 hours"
    route: "Complete exploration of all temples, gardens, lakeside paths, Longevity Hill summit"
    highlights: "Comprehensive experience, includes less-visited areas, excellent for photography"
    best_for: "History enthusiasts, photographers, those wanting deep experience"
  
  early_morning_escape:
    duration: "2-3 hours"
    route: "7:00 AM entry → join tai chi with locals → walk quiet paths → breakfast cafés"
    highlights: "Local experience, peaceful atmosphere, perfect light for photos"
    best_for: "Those seeking authentic local culture, photographers, early risers"
  
  combo_nearby:
    option1: "Summer Palace + Forbidden City: Spend morning at palace, afternoon at city"
    option2: "Summer Palace + Jingshan Park: Day at palace, evening sunset at park"