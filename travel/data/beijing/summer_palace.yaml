name: "Summer Palace"
subtitle: "Imperial Garden and Royal Retreat"
description: |
  The Summer Palace is a vast ensemble of lakes, gardens, and palaces in Beijing. It was used as a summer retreat by imperial families.
history: |
  First built in 1750, largely destroyed in 1860 and restored in 1886. It is a masterpiece of Chinese landscape garden design.
opening_hours: "06:30 – 20:00 (peak season), 07:00 – 19:00 (off season)"
ticket_price: "¥30 (entrance), ¥60 (combined ticket including garden and boat)"
best_time: "May–September for boating; autumn for foliage"
tips:
  - "Rent a boat on Kunming Lake."
  - "Walk up Longevity Hill for panoramic views."
  - "Avoid weekends to reduce crowds."
