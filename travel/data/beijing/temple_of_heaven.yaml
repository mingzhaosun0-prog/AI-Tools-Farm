name: "Temple of Heaven"
subtitle: "A place of worship and harmony"
description: |
  The Temple of Heaven is an imperial complex of religious buildings where emperors of the Ming and Qing dynasties performed annual ceremonies to pray for good harvests.
history: |
  Constructed between 1406 and 1420, it is renowned for its architectural precision and symbolic layout. The Hall of Prayer for Good Harvests is the iconic structure.
opening_hours: "06:30 – 22:00 (grounds), 08:00 – 17:30 (inner temples)"
ticket_price: "¥15 (entrance), ¥34 (through ticket)"
best_time: "Early morning (see locals doing tai chi), autumn for pleasant weather"
tips:
  - "Visit the Echo Wall and try its acoustics."
  - "Join morning exercises with locals."
  - "Buy combined ticket to see all attractions."
images: []
location: "Dongcheng District, Beijing"
activities: "Cultural performances, park walks, historical study"