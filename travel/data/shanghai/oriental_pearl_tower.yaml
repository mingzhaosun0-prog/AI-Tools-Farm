name: "Oriental Pearl Tower"
subtitle: "Shanghai's Most Iconic Landmark — 11 Spheres, One Unforgettable View"
description: |
  The Oriental Pearl Radio & TV Tower (东方明珠塔) is the instantly recognisable symbol of Shanghai's Pudong skyline. Standing 468 metres tall, its unique design features 11 spheres of varying sizes connected by three vertical columns, evoking a verse from Tang Dynasty poet Bai Juyi about pearls falling on a jade plate.

  The tower offers multiple observation levels, a revolving restaurant, the Shanghai Municipal History Museum, and — at 259 metres — a glass-bottomed observation deck where you can walk on air. The view from the top encompasses the entire Shanghai metropolis, from the Bund's colonial facades to the sprawling suburbs beyond.

  While newer towers have surpassed it in height, the Oriental Pearl remains the most beloved symbol of Shanghai's transformation into a global city.
history: |
  Designed by Chinese architect Jiang Huan, the Oriental Pearl Tower was built between 1991 and 1994 at a cost of ¥840 million. At the time, it was the tallest structure in China and the third-tallest TV tower in the world.

  The tower was conceived as a symbol of Shanghai's ambitions as an international financial centre, and its completion marked the beginning of Pudong's transformation from farmland into a futuristic skyline.

  The lower sphere (98 metres) houses a revolving restaurant, the upper sphere (263 metres) contains the main observation deck, and the space module (351 metres) offers the highest publicly accessible viewpoint. The tower also houses a 20-room hotel and the Shanghai Municipal History Museum in its base.
opening_hours: "08:00 – 21:30 (last entry 21:00)"
ticket_price: "¥199 (adult, all observation decks + history museum). Children (1-1.4m): ¥99. Seniors (65+): ¥99."
best_time: "Sunset to evening — watch the city light up. Book for 16:00-17:00 entry."
tips:
