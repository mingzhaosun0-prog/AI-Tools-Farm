  - "Visit the Shanghai Municipal History Museum in the base — included in ticket."
  - "The revolving restaurant offers dinner with a view (¥388-688 per person)."
  - "Go on a clear day — visibility matters at 351m."
  - "Queues can be 1-2 hours on weekends. Buy skip-the-line tickets online."
  - "Combine with Shanghai Tower for the complete Pudong skyline experience."
  - "The tower is beautifully illuminated at night — great photo from the Bund side."
