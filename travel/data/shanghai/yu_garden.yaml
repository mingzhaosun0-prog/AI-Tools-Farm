name: "Yu Garden (Yuyuan)"
subtitle: "A 400-Year-Old Classical Chinese Garden in the Heart of Shanghai"
description: |
  Yu Garden (Yuyuan, 豫园) is a masterpiece of classical Chinese garden design, hidden amid the bustling lanes of Shanghai's Old City. Built during the Ming Dynasty, this exquisite garden offers a tranquil escape with its ornate pavilions, rockeries, koi ponds, and winding corridors.

  Covering just 2 hectares, the garden is ingeniously designed to feel much larger through its use of "borrowed scenery" — each turn reveals a new vista of bridges, waterfalls, and delicate architecture. The adjacent Yuyuan Bazaar and City God Temple area offer a lively shopping and dining experience.

  Despite being surrounded by one of Shanghai's busiest areas, Yu Garden remains a serene oasis where you can experience the elegance of Ming Dynasty garden design at its finest.
history: |
  Yu Garden was built between 1559 and 1577 by Pan Yunduan, a Ming Dynasty government official, as a private garden for his parents to enjoy in their old age ("Yu" means "pleasing" or "satisfying" in Chinese). The garden was designed by renowned Ming garden designer Zhang Nanyang.

  The garden survived centuries of change — the Opium Wars, Taiping Rebellion, and Japanese occupation — though parts were damaged and rebuilt. In 1760, the garden was purchased by merchant guilds and became a public gathering place.

  During the 19th century, the garden housed the headquarters of the Small Sword Society, which briefly controlled Shanghai during a major rebellion. After extensive restoration in the 1950s and again in the 1980s, the garden was opened to the public and designated a national heritage site.
opening_hours: "09:00 – 16:30 (winter), 09:00 – 17:00 (summer). Last entry 30 min before close."
ticket_price: "¥30 (peak season Apr-Jun, Sep-Nov), ¥20 (off-peak). Free on certain days for seniors."
best_time: "Weekday mornings (less crowded). Spring for flowers, autumn for pleasant weather."
tips:
  - "Visit early to avoid the massive crowds (especially weekends)."
  - "Don't miss the Exquisite Jade Rock — a 3.3m tall, 5-ton strange stone."
  - "The Zigzag Bridge (Jiuqu Bridge) in the bazaar area is iconic — cross it slowly."
  - "Try xiaolongbao (soup dumplings) at Nanxiang Steamed Bun Restaurant nearby."
  - "Visit the Yuyuan Bazaar (adjacent) for souvenirs, tea, and traditional crafts."
  - "Combine with City God Temple (Chenghuang Miao) next door."
  - "The garden is small — you can see it thoroughly in 1 hour."
