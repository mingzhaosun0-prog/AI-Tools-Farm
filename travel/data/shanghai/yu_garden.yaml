# ── Sections ──
sections:
  Inner Garden (Neiyuan):
    difficulty: "Easy"
    crowd_level: "Moderate"
    recommended_for: "Garden lovers, tranquility seekers"
    description: "Smaller, more intimate section with exquisite rockeries, a dragon wall, and the Hall of Heralding Spring. The most traditional Ming garden experience."
    pros: "Quiet, beautiful rock formations"
    cons: "Small area, can feel cramped when busy"
  
  Yuyuan Bazaar:
    difficulty: "Easy"
    crowd_level: "Very crowded"
    recommended_for: "Shoppers, foodies"
    description: "A bustling marketplace surrounding the garden with traditional architecture, tea houses, craft shops, and famous food stalls."
    pros: "Great food, souvenirs, lively atmosphere"
    cons: "Extremely crowded, tourist prices"

# ── Crowd Patterns ──
crowd_patterns:
  peak_hours: "10:00 AM - 3:00 PM daily. Weekends are extremely crowded."
  best_time_to_visit: "09:00 AM opening time for a peaceful experience"
  seasonal_tips: "Spring (Mar-May): Flowers in bloom. Autumn (Sep-Nov): Comfortable weather. Avoid Chinese holidays."
  holiday_info: "Very crowded on weekends. Avoid Chinese New Year and Golden Week entirely."

