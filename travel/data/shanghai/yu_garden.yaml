difficulty_accessibility:
  physical_difficulty: "Easy — flat paths but many steps over bridges and into pavilions"
  walking_distance: "1-2 km through the garden and bazaar"
  wheelchair_accessible: "Partially — garden has many steps and narrow passages. Bazaar area is mostly accessible."
  best_for_elderly: "Limited — many steps and uneven surfaces. Bazaar area is more accessible."
