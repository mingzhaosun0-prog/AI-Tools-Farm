# ── Sections ──
sections:
  Bronze Gallery:
    difficulty: "Easy"
    crowd_level: "Moderate"
    recommended_for: "Art lovers, history enthusiasts — THE must-see gallery"
    description: "One of the world's finest collections of ancient Chinese bronzes. Over 400 pieces spanning the Shang, Zhou, and Han dynasties. Includes ritual vessels, weapons, and musical instruments."
    pros: "World-class collection, superb curation"
    cons: "Can be crowded, needs 45-60 min to appreciate"
  
  Ceramics Gallery:
    difficulty: "Easy"
    crowd_level: "Moderate"
    recommended_for: "Art lovers, pottery enthusiasts"
    description: "Comprehensive collection from Neolithic pottery to Ming/Qing imperial porcelain. Features the famous blue-and-white wares and rare polychrome pieces."
  
  Painting & Calligraphy:
    difficulty: "Easy"
    crowd_level: "Quiet"
    recommended_for: "Art connoisseurs, calligraphy enthusiasts"
    description: "Rotating exhibitions featuring masterworks from the Tang Dynasty to modern times. Pieces are rotated regularly to protect the delicate ink works."
  
  Jade Gallery:
    difficulty: "Easy"
    crowd_level: "Quiet"
    recommended_for: "Jade lovers, those wanting a quieter gallery"
    description: "Over 300 jade pieces from the Neolithic period through the Qing Dynasty. Exquisite carvings, ceremonial objects, and jewellery."
  
  Ming & Qing Furniture:
    difficulty: "Easy"
    crowd_level: "Quiet"
    recommended_for: "Design enthusiasts, furniture lovers"
    description: "Elegant examples of classical Chinese furniture — rosewood, mahogany, and bamboo pieces showcasing extraordinary craftsmanship."

