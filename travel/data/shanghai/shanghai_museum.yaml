name: "Shanghai Museum"
subtitle: "A Treasury of Ancient Chinese Art — One of China's Finest Museums"
description: |
  The Shanghai Museum (上海博物馆) is a world-class museum housing over 1.2 million artefacts spanning 5,000 years of Chinese civilisation. Its collection of ancient Chinese bronzes, ceramics, calligraphy, jade, and paintings is among the finest anywhere in the world.

  Housed in an iconic building shaped like an ancient Chinese bronze ding (tripod cauldron), the museum is organised into 11 galleries across four floors. The bronze collection alone is considered one of the three best in China, alongside the Palace Museum and the National Museum.

  Unlike Beijing's enormous National Museum, the Shanghai Museum is perfectly sized for a half-day visit — extensive enough to be awe-inspiring but compact enough to avoid museum fatigue.
history: |
  Founded in 1952, the Shanghai Museum moved to its current People's Square location in 1996. The building was designed to symbolise a bronze ding — a choice that reflects the museum's world-renowned bronze collection.

  The museum's collection was built primarily from donations and state allocations. During the Cultural Revolution (1966-1976), the museum staff protected many artefacts by hiding them, saving countless treasures from destruction.

  Today, the museum continues to grow through archaeological discoveries and generous donations, regularly hosting world-class special exhibitions. Its conservation laboratory is one of the most advanced in Asia.
opening_hours: "09:00 – 17:00 (last entry 16:00). Closed Mondays (except public holidays)."
ticket_price: "Free (advanced booking recommended via WeChat mini-program or official website). Special exhibitions: ¥50-100."
best_time: "Weekday mornings (fewer school groups). Avoid Mondays (closed)."
tips:
  - "BOOK FREE TICKETS ONLINE in advance — same-day tickets often run out."
  - "Bring your passport — required for entry."
  - "Allow 3-4 hours to see all galleries properly."
  - "Start with the Bronze Gallery (ground floor) — the museum's crown jewel."
  - "Audio guide recommended (¥40, available in 8 languages)."
  - "The jade collection on the 3rd floor is exquisite and often overlooked."
  - "Photography allowed (no flash, no tripod)."
  - "Combine with People's Square and nearby Nanjing Road."
