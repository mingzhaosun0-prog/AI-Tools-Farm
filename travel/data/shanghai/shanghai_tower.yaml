name: "Shanghai Tower"
subtitle: "China's Tallest Building — 632 Metres of Architectural Genius"
description: |
  The Shanghai Tower (上海中心大厦) is a 632-metre, 128-storey megatall skyscraper that dominates the Pudong skyline. As China's tallest building and the world's third-tallest (behind Burj Khalifa and Merdeka 118), it is a breathtaking engineering achievement and a symbol of modern Shanghai's ambition.

  The tower's distinctive twisting form — a 120-degree spiral — reduces wind loads by 24% and gives it a dynamic elegance. The observation deck on the 118th floor (546 metres) offers the highest public viewing platform in China, with 360-degree views of Shanghai and the Huangpu River.

  The tower houses office space, the J-Hotel (the world's highest hotel at 556 metres), restaurants, and a stunning atrium. The journey to the top in the world's fastest elevator (20 m/s, 55 seconds) is an experience in itself.
history: |
  Shanghai Tower was designed by the American architectural firm Gensler, with lead architect Jun Xia (a Shanghai native). Construction began in November 2008 and topped out in August 2013, with the observation deck opening to the public in July 2016.

  The tower's spiral form was inspired by the curves of the Huangpu River and traditional Chinese "nine-bend" bridges. The double-skin facade creates nine indoor sky gardens (sky lobbies) that serve as community spaces within the building.

  The foundation required 980 piles driven 86 metres deep into the soft Shanghai soil — a remarkable engineering feat given the city's challenging geology. The tower is designed to withstand magnitude 7.0 earthquakes and typhoon-force winds.
opening_hours: "09:00 – 21:00 (last entry 20:30). Best sunset visits: arrive by 16:30-17:00."
ticket_price: "¥180 (adult, 118th floor), ¥220 (adult, 118th+125th floor combo). Children and seniors at reduced rates."
best_time: "Sunset (arrive 16:30-17:00) — watch day turn to night. Clear days only (check weather)."
tips:
  - "Book tickets online in advance (skip-the-queue option available)."
  - "Go on a clear day — fog and smog can completely obscure the view."
  - "Arrive 1 hour before sunset to see daytime, sunset, and night views."
  - "The elevator ride to the top takes only 55 seconds — ear-popping!"
  - "The glass-floor section on the 118th floor is not for the faint-hearted."
  - "Combine with Jin Mao Tower (next door) for a different perspective."
  - "Visit the Shanghai Tower Museum in the basement for the building's story."
