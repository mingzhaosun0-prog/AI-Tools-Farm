# ── Sections ──
sections:
  Historic Buildings Walk:
    difficulty: "Easy"
    crowd_level: "Very crowded"
    recommended_for: "Architecture lovers, photographers"
    description: "Walk south to north past the 52 protected heritage buildings including the Peace Hotel, Customs House, HSBC Building, and the Shanghai Pudong Development Bank."
  Promenade & Viewpoints:
    difficulty: "Easy"
    crowd_level: "Very crowded"
    recommended_for: "All visitors"
    description: "The 1.5km tree-lined promenade with dedicated viewpoints and photo platforms facing Pudong. Benches and cafés along the way."
  Huangpu River Cruise:
    difficulty: "Easy"
    crowd_level: "Busy during peak hours"
    recommended_for: "First-time visitors, couples, photographers"
    description: "Various cruise options from the Bund wharves. Standard 50-min loop shows both the Bund and Pudong skylines. Night cruises are particularly magical."

# ── Crowd Patterns ──
crowd_patterns:
  peak_hours: "10:00 AM - 4:00 PM (day tourists), 19:00-21:00 (night lights crowd)"
  best_time_to_visit: "17:00-19:00 — watch sunset and stay for the lights"
  seasonal_tips: "Spring (Mar-May) and Autumn (Sep-Nov) offer the best weather. Summer evenings are pleasant. Winter can be cold and foggy."
  holiday_info: "Extremely crowded during National Day (Oct 1-7) and Labour Day (May 1). Avoid if possible."

