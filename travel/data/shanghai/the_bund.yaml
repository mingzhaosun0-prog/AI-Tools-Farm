name: "The Bund"
subtitle: "Shanghai's Iconic Waterfront — Where East Meets West"
description: |
  The Bund (Wàitān, 外滩) is a waterfront promenade along the Huangpu River that showcases the best of Shanghai's architectural heritage. On one side stand 52 magnificent colonial-era buildings — the "Exposition of World Architecture" — while across the river towers the futuristic Pudong skyline with the Oriental Pearl Tower and Shanghai Tower.

  Stretching 1.5 kilometres, the Bund offers a stunning contrast between old and new Shanghai. It's the city's most photographed location, equally beautiful by day when the colonial facades gleam, and by night when both the historic buildings and Pudong skyscrapers are illuminated in a spectacular light show.
history: |
  In the mid-19th century, following the Treaty of Nanking (1842), Shanghai opened as a treaty port and the Bund became the centre of foreign settlement. British, French, American, and other international trading companies built their headquarters here, creating a unique collection of Art Deco, Baroque, Gothic, Neoclassical, and Renaissance-style buildings.

  During the 1920s and 1930s, the Bund was the financial centre of East Asia, home to banks, trading houses, and the iconic Peace Hotel (built by Sir Victor Sassoon). After 1949, the area declined in importance but survived urban redevelopment.

  In the 1990s, the construction of the Pudong skyline created the iconic Bund-versus-Pudong contrast. Today, it remains Shanghai's number one tourist attraction, visited by millions who walk its tree-lined promenade.
opening_hours: "Open 24 hours. Best views: sunrise and 19:00-22:00 (illuminated buildings). Huangpu River cruise: 09:00-22:00."
ticket_price: "Free (promenade). Huangpu River sightseeing cruise: ¥120-180 per person (50 min)."
best_time: "Sunset (17:00-18:30) — watch the transition from day to night. Come back at 19:00 for the lights."
tips:
  - "Walk the full 1.5km promenade from Baidu Bridge to Yan'an Road."
  - "Visit at sunset and stay for the night lights (buildings illuminate at 19:00)."
  - "Cross the river via the Bund Sightseeing Tunnel (¥50) for a fun experience."
  - "Choose the Pudong-side riverside walkway for a different view back toward the Bund."
  - "Book a Huangpu River cruise for the best photo opportunities."
  - "Avoid Chinese holidays — the promenade gets extremely crowded."
